async function unseal(pass) {
  const km = await crypto.subtle.importKey('raw',
    new TextEncoder().encode(pass), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    { name:'PBKDF2', salt:SALT, iterations:600000, hash:'SHA-256' },
    km, { name:'AES-GCM', length:256 }, false, ['decrypt']);
  const plain = await crypto.subtle.decrypt({ name:'AES-GCM', iv:IV }, key, DATA);
  document.open();
  document.write(new TextDecoder().decode(plain));
  document.close();
}
document.getElementById('f').addEventListener('submit', async (e) => {
  e.preventDefault();
  const err = document.getElementById('err');
  err.classList.remove('on');
  try {
    await unseal(document.getElementById('pw').value);
  } catch {
    err.classList.add('on');
  }
});
// key in the URL: /brief/#k=word or /brief/?k=word — fragment preferred (never sent to the server)
(async () => {
  const fromHash = location.hash.startsWith('#k=') ? decodeURIComponent(location.hash.slice(3)) : null;
  const fromQuery = new URLSearchParams(location.search).get('k');
  const pass = fromHash || fromQuery;
  if (pass) { try { await unseal(pass); } catch { document.getElementById('err').classList.add('on'); } }
})();
</script>
