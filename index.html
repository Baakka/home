<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>4st.space</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
    }
    h1 {
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      color: #555;
      text-transform: uppercase;
    }
    .links {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    a {
      color: #e0e0e0;
      text-decoration: none;
      font-size: 1.4rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      padding: 0.4rem 0;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s, color 0.2s;
    }
    a:hover {
      color: #fff;
      border-bottom-color: #fff;
    }
    .desc {
      font-size: 0.8rem;
      color: #444;
      margin-top: 0.2rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>4st.space</h1>
  <div class="links">
    <div>
      <a href="https://sonoscope.4st.space">Sonoscope</a>
      <p class="desc">sound analyser</p>
    </div>
  </div>
</body>
</html>
